name: Build and Save Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (ARM64)
        run: |
          echo "Building Docker image for arm64..."
          docker buildx build --platform linux/arm64 --load -t yolop-adas-latest:latest .
          
      - name: Save Docker Image as .bin (Kaggle Safe)
        run: |
          echo "Saving Docker image to .bin format..."
          docker save -o yolop-adas-latest.bin yolop-adas-latest:latest
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolop-adas-docker-image
          path: yolop-adas-latest.bin
          retention-days: 7
