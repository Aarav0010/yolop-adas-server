name: Build and Save Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image (x86_64)
        run: |
          echo "Building native Docker image..."
          docker build -t yolop-adas-latest:latest .
          
      - name: Save Docker Image as .bin (Kaggle Safe)
        run: |
          echo "Saving Docker image to .bin format..."
          docker save -o yolop-adas-latest.bin yolop-adas-latest:latest
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yolop-adas-docker-image
          path: yolop-adas-latest.bin
          retention-days: 7
